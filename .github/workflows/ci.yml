name: CI

"on":
    push:
        branches: [main]

jobs:
    build-cpp:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Compile C++
              run: g++ capture/src/main.cpp -o build/hello && ./build/hello

    test-python:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Run Python smoke test
              run: python3 test/test_smoke.py
            