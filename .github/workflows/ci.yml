name: CI

"on":
  push:
    branches: [main]

jobs:
  build-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install libpcap librdkafka
        run: sudo apt-get install -y libpcap-dev librdkafka-dev
      - name: Compile C++
        run: make -C capture

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Python smoke test
        run: python3 tests/test_smoke.py
