name: CI

"on":
  push:
    branches: [main]

jobs:
  build-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install libpcap
        run: sudo apt-get install -y libpcap-dev
      - name: Compile C++
        run: mkdir -p build && g++ capture/src/main.cpp -lpcap -o build/hello

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Python smoke test
        run: python3 tests/test_smoke.py
